# ===========================================================
# 1. 基础设备定义
# ===========================================================

# 键盘显示的蓝牙名称
CONFIG_ZMK_KEYBOARD_NAME="Pad15"

# ===========================================================
# 2. 电源管理
# ===========================================================
# 启用外部设备供电控制（如果你的主控板有 VCC 控制引脚，设为 y 可以更省电）
CONFIG_ZMK_EXT_POWER=y
# 禁用所有电源管理和自动休眠
CONFIG_PM=n
# 进入低功耗休眠状态的超时时间（单位：毫秒，这里设置为 5 分钟）
# 在此状态下，蓝牙依然连接，但功耗降低
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=150000

# 进入“完全断开蓝牙”的深度休眠时间（单位：毫秒，这里设置为 10 分钟）
# 唤醒时可能需要 1-2 秒重新连接蓝牙，但极度省电
CONFIG_ZMK_IDLE_TIMEOUT=600000

# 增强蓝牙发射功率（解决分体键盘信号被金属外壳遮挡或连接不稳的问题）范围：-20 到 8，建议设为 8
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# 关闭蓝牙 GATT 订阅的强制执行
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# 开启电池电量报告
CONFIG_ZMK_BATTERY_REPORTING=y

# ===========================================================
# 3. 硬件功能模块开启
# ===========================================================

# 开启旋转编码器（EC11）支持
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 开启鼠标模拟功能（必须开启才能使用摇杆控制鼠标或模拟滚轮）
CONFIG_ZMK_MOUSE=y
# 启用 ADC 和模拟输入
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y

# 启用摇杆驱动
CONFIG_ADC=y
# Use async mode (Optional)
CONFIG_ADC_ASYNC=y

# Enable Analog Input Module
CONFIG_ANALOG_INPUT=y
# CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y
# CONFIG_ANALOG_INPUT_REPORT_INTERVAL_MIN=22

# Enable logging for pre/post processed value
CONFIG_ANALOG_INPUT_LOG_DBG_RAW=y
CONFIG_ANALOG_INPUT_LOG_DBG_REPORT=y

# Just in case, you don't RTFM
CONFIG_INPUT=y

# ↓↓↓↓ Advence Settings ↓↓↓↓

# Enable using explicit ADC channels config from device tree
# - default to false
# - It allows composited channel to be used. e.g. differential with +/-vRef.
CONFIG_ANALOG_INPUT_USE_DTS_ADC_CH_CFG=n

# ADC channels resolution (in bit)
# - default to 12 bit
# - With above CONFIG_ANALOG_INPUT_USE_DTS_ADC_CH_CFG=y, it might need this 
#   to enlarge buffer of ADC sequencer for 24bit hi-res ADC.
CONFIG_ANALOG_INPUT_ADC_RES=12

# ZMK 鼠标指针支持（必须）
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# 允许通过 USB 和 蓝牙 同时输出（插线优先）
CONFIG_ZMK_USB=y
# 启用蓝牙低功耗 (BLE) 连接
CONFIG_ZMK_BLE=y

CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y   # 开启全键无冲N-Key Rollover
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y  # 开启实验性蓝牙连接算法
CONFIG_KSCAN=y
# 按键按下和抬起的消抖时间（毫秒），专治乱跳和连击
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# ===========================================================
# 4. RGB 背光与灯效控制 (WS2812)
# ===========================================================

# 启用 RGB 底灯/背光支持
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=y
CONFIG_LED_STRIP=y
CONFIG_SPI=y

# 默认亮度 (0-100)
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=30
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y         # 上电后默认打开灯效（否则默认是关的，看不到效果）
# 默认灯效：1 = Breathe（呼吸灯）;0 = Solid（纯色）;2 = Spectrum（彩虹流动）3 = Swirl（旋转）
# CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# WS2812 灯珠亮度限制，最高只能到 40%，防止电流过大
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
# 开机默认就是 40%
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=30
# 可选：调整默认速度、亮度等（测试时推荐保留）
# 默认速度（1-5，3 是中等）
# CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3
# 最大亮度百分比
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
# 断开蓝牙或进入休眠时，是否自动关闭灯效
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# ===========================================================
# 5. 进阶与调试设置 (新手建议先保持默认)
# ===========================================================

# 开启 ZMK Studio 支持（如果你想用 GUI 软件实时改键，需要开启此项）
# 注意：这会占用额外的固件空间
CONFIG_ZMK_STUDIO=y
